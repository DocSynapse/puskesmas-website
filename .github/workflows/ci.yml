# Architected and built by the one and only Claudesy.
name: CI

on:
  push:
    branches: ["master", "main", "claude/**"]
  pull_request:
    branches: ["master", "main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check + Vite build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  brand-compliance:
    name: Brand Compliance Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Claudesy brand signatures
        run: |
          echo "Scanning for Claudesy brand signature compliance..."
          MISSING=$(grep -rL "Claudesy" . \
            --include="*.py" --include="*.js" --include="*.ts" \
            --include="*.tsx" --include="*.jsx" --include="*.go" \
            --include="*.rs" --include="*.sh" --include="*.yaml" \
            --include="*.yml" --include="*.toml" --include="*.md" \
            --include="*.html" --include="*.css" --include="*.scss" \
            --include="*.sql" --include="*.proto" --include="*.tf" \
            --include="*.hcl" \
            | grep -v "node_modules" | grep -v ".git" \
            | grep -v "dist" | grep -v "build" \
            | grep -v "google22238cc24e0d1002" \
            || true)
          if [ -n "$MISSING" ]; then
            echo "COMPLIANCE FAILURE: The following files are missing the Claudesy brand signature:"
            echo "$MISSING"
            exit 1
          fi
          echo "All files comply with the Claudesy brand standard."
