name: Jules Auto Scan & Fix

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1' # Setiap Senin jam 6 pagi UTC
  workflow_dispatch:

jobs:
  jules-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          branch: master
          include_diff: true
          include_history: true
          prompt: |
            You are scanning the Puskesmas Website — a Vite + React public-facing site.
            Stack: Vite, React, TypeScript, Tailwind CSS, shadcn/ui.

            Scan for:
            1. CRITICAL: hardcoded secrets, API keys, XSS vulnerabilities
            2. HIGH: missing input validation, type safety issues, accessibility (a11y)
            3. MEDIUM: unused imports, dead code, SEO issues, performance

            Rules:
            - Fix highest severity first
            - Keep changes under 100 lines per PR
            - Run `npm run lint` and `npm run build` before creating PR
            - Follow TypeScript strict mode (no `any`, no `@ts-ignore`)
            - Preserve all existing SEO meta tags and structured data
