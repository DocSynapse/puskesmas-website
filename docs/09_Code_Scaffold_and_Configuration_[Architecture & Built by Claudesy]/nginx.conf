# ============================================================
# nginx.conf — Puskesmas Balowerti SPA Configuration
# Architecture & Built by Claudesy
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Content Security Policy (adjust for your APIs) ───────
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://maps.googleapis.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https://*.googleapis.com https://*.gstatic.com https://*.google.com;
        connect-src 'self' https://maps.googleapis.com https://places.googleapis.com;
        frame-src https://www.google.com/maps;
        object-src 'none';
        base-uri 'self';
    " always;

    # ── Static Asset Caching ─────────────────────────────────
    # Vite-generated assets have content hashes — cache forever
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images — cache for 30 days
    location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Data files — shorter cache
    location /data/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── SPA Routing — serve index.html for all routes ────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── robots.txt ───────────────────────────────────────────
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ── Deny access to hidden files ──────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
